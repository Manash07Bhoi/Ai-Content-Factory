name: Build & Deploy CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install Dependencies
      run: |
        cd src && npm ci
        cd ../frontend && npm ci

    - name: Run Backend Tests
      run: cd src && npm run test

    - name: Build Frontend
      run: cd frontend && npm run build

    - name: Build Backend
      run: cd src && npm run build

    - name: Build Docker Image
      run: docker build -t ai-content-factory:latest .

    # Mock deployment step (replace with actual AWS ECS / EKS instructions)
    - name: Push to ECR (Mock)
      run: echo "Pretending to push docker image to registry..."
