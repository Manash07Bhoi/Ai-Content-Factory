version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: aicf_postgres
    environment:
      POSTGRES_USER: aicf_user
      POSTGRES_PASSWORD: aicf_password
      POSTGRES_DB: aicf_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicf_user -d aicf_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: aicf_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: aicf_mongo_user
      MONGO_INITDB_ROOT_PASSWORD: aicf_mongo_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: aicf_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
